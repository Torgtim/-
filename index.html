<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Passord</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    html,body{
        height:100%;margin:0;
        background:#000;color:#fff;
        font-family:Arial,Helvetica,sans-serif;
        display:flex;align-items:center;justify-content:center;
    }
    .box{
        text‑align:center;
        width:90%;max-width:380px;
    }
    input{
        width:100%;padding:.8rem;margin-top:.8rem;
        font-size:1.2rem;border:none;border-radius:4px;
    }
    button{
        margin-top:.8rem;padding:.6rem 1rem;
        font-size:1rem;background:#444;color:#fff;
        border:none;border-radius:4px;cursor:pointer;
    }
    button:hover{background:#666;}
    .binary{
        margin-top:2rem;
        font-family:"Courier New",Courier,monospace;
        white‑space:pre-wrap;word-break:break-all;
        opacity:0;transition:opacity .3s;
    }
</style>
</head>
<body>

<div class="box" id="app">
    <h2>Passord</h2>
    <input type="password" id="pwd" placeholder="Skriv inn passordet" autocomplete="off">
    <button id="loginBtn">Logg inn</button>

    <!-- Her settes inn den binære meldingen -->
    <div class="binary" id="binaryMsg"></div>
</div>

<script>
/* ---- Konstanter ---- */
const CORRECT_PWD = "16443";
const MESSAGE    = "PLS ikke si dette til noen... jeg er forelsket deg.";

/* ---- Hjelpe‑funksjon: tekst → 8‑bits binær ---- */
function toBinary(str){
    return str
        .split('')
        .map(ch => ch.charCodeAt(0).toString(2).padStart(8,'0'))
        .join(' ');
}

/* ---- DOM‑referanser ---- */
const btn   = document.getElementById('loginBtn');
const pwd   = document.getElementById('pwd');
const binDiv= document.getElementById('binaryMsg');
const app   = document.getElementById('app');

/* ---- Håndter trykk på knappen / ENTER ---- */
btn.addEventListener('click', check);
pwd.addEventListener('keydown', e=>{ if(e.key==='Enter') check(); });

function check(){
    if(pwd.value === CORRECT_PWD){
        /* 1️⃣ Fjern input‑feltet og knappen */
        pwd.style.display = 'none';
        btn.style.display = 'none';

        /* 2️⃣ Vis meldingen i binær */
        binDiv.textContent = toBinary(MESSAGE);
        binDiv.style.opacity = 1;          // fade‑in

        /* 3️⃣ Etter 3 sekunder – redirect */
        setTimeout(()=>{
            window.location.href = "https://m.youtube.com/shorts/MTwoWWmN4HE";
        },3000);
    }else{
        alert('Feil passord. Prøv igjen.');
        pwd.value = '';
        pwd.focus();
    }
}
</script>
</body>
</html>

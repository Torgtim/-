<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<title>Passord</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    html,body{
        height:100%;margin:0;
        background:#000;color:#fff;
        font-family:Arial,Helvetica,sans-serif;
        display:flex;align-items:center;justify-content:center;
    }
    .box{
        text-align:center;
        width:90%;max-width:380px;
    }
    input{
        width:100%;padding:.8rem;margin-top:.8rem;
        font-size:1.2rem;border:none;border-radius:4px;
    }
    button{
        margin-top:.8rem;padding:.6rem 1rem;
        font-size:1rem;background:#444;color:#fff;
        border:none;border-radius:4px;cursor:pointer;
    }
    button:hover{background:#666;}
    .binary{
        margin-top:2rem;
        font-family:"Courier New",Courier,monospace;
        white-space:pre-wrap;word-break:break-all;
        opacity:0;               /* starter usynlig   */
        transition:opacity .4s;  /* fade‑in/out       */
    }
</style>
</head>
<body>

<div class="box" id="app">
    <h2>Passord</h2>
    <input type="password" id="pwd" placeholder="Skriv inn passordet" autocomplete="off">
    <button id="loginBtn">Logg inn</button>

    <!-- Binær meldingsboks -->
    <div class="binary" id="binaryMsg"></div>
</div>

<script>
/* ---------- Konstanter ---------- */
const CORRECT_PWD = "16443";
const MESSAGE    = "PLS ikke si dette til noen... jeg er forelsket deg.";
const SHOW_TIME  = 3000;   // hvor lenge meldingen skal være synlig (ms)
const FADE_TIME  = 400;    // varigheten av fade‑out (ms)

/* ---------- Hjelpefunksjon ---------- */
function toBinary(str){
    return str
        .split('')
        .map(ch => ch.charCodeAt(0).toString(2).padStart(8,'0'))
        .join(' ');
}

/* ---------- DOM‑referanser ---------- */
const btn   = document.getElementById('loginBtn');
const pwd   = document.getElementById('pwd');
const binDiv= document.getElementById('binaryMsg');

/* ---------- Håndter innsending ---------- */
btn.addEventListener('click', check);
pwd.addEventListener('keydown', e=>{ if(e.key==='Enter') check(); });

function check(){
    if(pwd.value === CORRECT_PWD){
        /* Skjul input‑feltet og knappen */
        pwd.style.display = 'none';
        btn.style.display = 'none';

        /* Vis binær melding (fade‑in) */
        binDiv.textContent = toBinary(MESSAGE);
        binDiv.style.opacity = 1;

        /* Etter SHOW_TIME ms: fade‑out, så redirect */
        setTimeout(()=>{
            binDiv.style.opacity = 0;               // start fade‑out
            // Vent til fade‑out er ferdig, så redirect
            setTimeout(()=>{
                window.location.href = "https://m.youtube.com/shorts/MTwoWWmN4HE";
            }, FADE_TIME);
        }, SHOW_TIME);
    }else{
        alert('Feil passord. Prøv igjen.');
        pwd.value = '';
        pwd.focus();
    }
}
</script>
</body>
</html>
